services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '8000:8000'
        # All app configuration (including the MySQL credentials below) comes
        # from .env, which the entrypoint creates from .env.example. Keeping it
        # out of the container environment lets `php artisan test` use its own
        # in-memory SQLite config without interference.
        depends_on:
            mysql:
                condition: service_healthy

    mysql:
        image: 'mysql:8.0'
        environment:
            MYSQL_DATABASE: trulove
            MYSQL_USER: trulove
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: secret
        volumes:
            - 'trulove-mysql:/var/lib/mysql'
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-psecret']
            interval: 5s
            timeout: 5s
            retries: 20

volumes:
    trulove-mysql:
