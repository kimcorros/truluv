services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - '8000:8000'
        environment:
            APP_ENV: local
            APP_DEBUG: 'true'
            APP_URL: http://localhost:8000
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: '3306'
            DB_DATABASE: trulove
            DB_USERNAME: trulove
            DB_PASSWORD: secret
        depends_on:
            mysql:
                condition: service_healthy

    mysql:
        image: 'mysql:8.0'
        environment:
            MYSQL_DATABASE: trulove
            MYSQL_USER: trulove
            MYSQL_PASSWORD: secret
            MYSQL_ROOT_PASSWORD: secret
        volumes:
            - 'trulove-mysql:/var/lib/mysql'
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-psecret']
            interval: 5s
            timeout: 5s
            retries: 20

volumes:
    trulove-mysql:
